name: AI Review

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
  issue_comment:
    types: [created]
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ai-review.yml"
  schedule:
    - cron: "52 7 * * 2"

jobs:
  pr-agent:
    if: >-
      ${{ github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request) }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
    uses: arc-web/review-workflows/.github/workflows/pr-agent.yml@main
    secrets:
      OPENAI_KEY: ${{ secrets.OPENAI_KEY }}

  semgrep:
    if: ${{ github.event_name != 'issue_comment' }}
    permissions:
      contents: read
    uses: arc-web/review-workflows/.github/workflows/semgrep.yml@main
